<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Knights Acquisitions</title>
  </head>
  <body>
    <header class="titlebar">
      <div class="window-title">
        <span>Knights Acquisitions</span>
      </div>
    </header>

    <main class="login">
      <!-- Sign Up Form (default) -->
      <div class="auth-card" id="signup-card">
        <div class="login-header">
          <h1>Create account</h1>
          <p>Set up your vault to get started.</p>
        </div>

        <div class="field">
          <label for="signup-username">Username</label>
          <input
            type="text"
            id="signup-username"
            autocomplete="username"
            spellcheck="false" />
        </div>

        <div class="field">
          <label for="signup-password">Password</label>
          <input
            type="password"
            id="signup-password"
            autocomplete="new-password" />
        </div>

        <div class="field">
          <label for="signup-confirm">Confirm Password</label>
          <input
            type="password"
            id="signup-confirm"
            autocomplete="new-password" />
        </div>

        <div class="divider"></div>

        <button class="login-btn">Create Account</button>

        <p class="auth-switch">
          Already have an account?
          <span class="auth-switch-link" id="go-to-login">Sign in</span>
        </p>
      </div>

      <!-- Login Form -->
      <div class="auth-card hidden" id="login-card">
        <div class="login-header">
          <h1>Welcome back</h1>
          <p>Enter your credentials to unlock your vault.</p>
        </div>

        <div class="field">
          <label for="username">Username</label>
          <input
            type="text"
            id="username"
            autocomplete="username"
            spellcheck="false" />
        </div>

        <div class="field">
          <label for="password">Master Password</label>
          <input
            type="password"
            id="password"
            autocomplete="current-password" />
        </div>

        <div class="divider"></div>

        <button class="login-btn">Login</button>

        <p class="auth-switch">
          Don't have an account?
          <span class="auth-switch-link" id="go-to-signup">Sign up</span>
        </p>
      </div>
    </main>
    <script src="scripts/login.js"></script>
  </body>
</html>
